version: '3.8'

services:

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c", "chmod 666 /var/run/docker.sock && /usr/local/bin/jenkins.sh"]
    networks:
      - utopia_net

  sonarqube:
    image: sonarqube:community
    container_name: utopiahire-sonarqube
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    restart: unless-stopped
    networks:
      - utopia_net

  prometheus:
    image: prom/prometheus:latest
    container_name: utopiahire-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - utopia_net

  grafana:
    image: grafana/grafana:latest
    container_name: utopiahire-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    restart: unless-stopped
    networks:
      - utopia_net

  suricata:
    image: jasonish/suricata:latest
    container_name: utopiahire-suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml
      - ./suricata/rules:/etc/suricata/rules
      - ./suricata/logs:/var/log/suricata
    command: >
      -i br-79015fa2c51d
      -c /etc/suricata/suricata.yaml
      -S /etc/suricata/rules/utopiahire.rules
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: utopiahire-dashboard
    ports:
      - "8501:8501"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./security-reports:/app/security-reports
      - ./suricata/logs:/app/suricata/logs
    environment:
      - OPENAI_API_KEY=${AI_API_KEY}
    restart: unless-stopped
    networks:
      - utopia_net

volumes:
  jenkins_data:
  sonar_data:
  sonar_logs:
  grafana_data:

networks:
  utopia_net:
    external: true
    name: utopiahire-main_default