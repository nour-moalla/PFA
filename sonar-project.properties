sonar.projectKey=utopiahire
sonar.projectName=UtopiaHire Career Services
sonar.projectVersion=1.0.0
sonar.sources=backend,frontend,dashboard
sonar.python.version=3.11

# Exclude initialization and configuration files from coverage analysis
# These files are mostly imports and configuration that don't need test coverage
sonar.coverage.exclusions=**/main.py,**/__init__.py,**/config.py,**/settings.py,**/requirements.txt,**/setup.py

# Exclude test and vendor directories
sonar.exclusions=**/node_modules/**,**/venv/**,**/.venv/**,**/coverage/**,**/.pytest_cache/**

# Python-specific settings
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.pylint.reportPath=pylint-report.txt
